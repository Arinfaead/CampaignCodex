services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campaign_codex}
      POSTGRES_USER: ${POSTGRES_USER:-campaign_codex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campaign_codex}
    volumes:
      - campaign-codex-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campaign_codex} -d ${POSTGRES_DB:-campaign_codex}"]
      interval: 5s
      timeout: 5s
      retries: 10

  campaign-codex:
    image: ${CAMPAIGN_CODEX_IMAGE:-ghcr.io/arinfaead/campaigncodex:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-campaign_codex}:${POSTGRES_PASSWORD:-campaign_codex}@postgres:5432/${POSTGRES_DB:-campaign_codex}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:${APP_PORT:-8080}}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:${APP_PORT:-8080}/api/auth/oauth/callback}
      - OIDC_ADMIN_GROUP=${OIDC_ADMIN_GROUP:-CampaignCodex Admins}
      - OIDC_DM_GROUP=${OIDC_DM_GROUP:-CampaignCodex DMs}
      - CAMPAIGN_CODEX_VERSION=${CAMPAIGN_CODEX_VERSION:-0.1.0-beta.1}
      - CAMPAIGN_CODEX_LOG_FILE=/app/data/campaigncodex.log
      - CAMPAIGN_CODEX_UPDATE_COMMAND=${CAMPAIGN_CODEX_UPDATE_COMMAND:-}
    volumes:
      - campaign-codex-data:/app/data

volumes:
  campaign-codex-postgres:
  campaign-codex-data:
