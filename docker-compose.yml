services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campaign_codex
      POSTGRES_USER: campaign_codex
      POSTGRES_PASSWORD: campaign_codex
    volumes:
      - campaign-codex-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_codex -d campaign_codex"]
      interval: 5s
      timeout: 5s
      retries: 10

  campaign-codex:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://campaign_codex:campaign_codex@postgres:5432/campaign_codex

volumes:
  campaign-codex-postgres:
