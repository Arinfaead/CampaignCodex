name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0-beta.1 or v1.0.0 after explicit approval"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *beta* || "$TAG" == *alpha* || "$TAG" == *rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build categorized release notes
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)"
          RANGE="$TAG"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${TAG}"
          fi

          write_section() {
            local title="$1"
            local pattern="$2"
            echo "## ${title}" >> release-notes.md
            local lines
            lines="$(git log "$RANGE" --pretty=format:'- %s' --extended-regexp --regexp-ignore-case --grep="$pattern" || true)"
            if [ -n "$lines" ]; then
              echo "$lines" >> release-notes.md
            else
              echo "- Keine Eintrﾃ､ge." >> release-notes.md
            fi
            echo "" >> release-notes.md
          }

          echo "# CampaignCodex ${TAG}" > release-notes.md
          echo "" >> release-notes.md
          write_section "Hinzugefﾃｼgt" "^(add|added|feat|feature|fﾃｼge|hinzu|implement)"
          write_section "Gepatcht" "^(fix|fixed|patch|patched|hotfix|repair|korrig|beheb|update|change|adjust|refactor)"
          write_section "Gelﾃｶscht" "^(remove|removed|delete|deleted|drop|dropped|entfern|lﾃｶsch)"
          echo "## Vollstﾃ､ndiger Commit-Verlauf" >> release-notes.md
          git log "$RANGE" --pretty=format:'- %h %s' >> release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: CampaignCodex ${{ steps.release.outputs.tag }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          body_path: release-notes.md
